// ========== STATE ==========
const TOTAL = pages.length;
let cur = 0;           // index of left page in current spread (always even, or 0)
let animating = false;
let touchSX = 0, touchSY = 0;

// ========== DOM REFS ==========
const flipbook    = document.getElementById('flipbook');
const flipInner   = document.getElementById('flipInner');
const pageLeft    = document.getElementById('pageLeft');
const pageRight   = document.getElementById('pageRight');
const contentLeft = document.getElementById('contentLeft');
const contentRight= document.getElementById('contentRight');
const numLeft     = document.getElementById('numLeft');
const numRight    = document.getElementById('numRight');
const arrowLeft   = document.getElementById('arrowLeft');
const arrowRight  = document.getElementById('arrowRight');
const pageInfo    = document.getElementById('pageInfo');
const progressFill= document.getElementById('progressFill');
const progressThumb=document.getElementById('progressThumb');
const progressTrack=document.getElementById('progressTrack');
const pageInput   = document.getElementById('pageInput');
const totalPagesEl= document.getElementById('totalPages');

// ========== SIZING ==========
const ASPECT = 297 / 210; // A4 aspect ratio

function sizeBook() {
  const area = document.getElementById('bookArea');
  const aw = area.clientWidth - 40;
  const ah = area.clientHeight - 40;
  // book is two pages side by side
  let bw = aw;
  let bh = bw / 2 * ASPECT;
  if (bh > ah) { bh = ah; bw = bh / ASPECT * 2; }
  flipbook.style.width  = bw + 'px';
  flipbook.style.height = bh + 'px';
}

// ========== RENDER ==========
function renderContent(el, numEl, idx, side) {
  if (idx < 0 || idx >= TOTAL) {
    el.innerHTML = '';
    el.style.background = '#faf8f0';
    el.style.padding = '';
    numEl.textContent = '';
    return;
  }
  const p = pages[idx];
  el.innerHTML = p.content;
  if (p.isCover) {
    el.style.padding = '0';
    el.style.background = 'transparent';
    numEl.textContent = '';
  } else {
    el.style.padding = '';
    el.style.background = '';
    numEl.textContent = idx + 1;
  }
}

function showSpread() {
  const li = cur;
  const ri = cur + 1;
  renderContent(contentLeft, numLeft, li, 'left');
  renderContent(contentRight, numRight, ri < TOTAL ? ri : -1, 'right');
  updateUI();
}

function updateUI() {
  const li = cur;
  const ri = Math.min(cur + 1, TOTAL - 1);
  const displayR = cur + 1 < TOTAL ? cur + 2 : cur + 1;
  pageInfo.textContent = (li + 1) + '-' + displayR + ' / ' + TOTAL;
  totalPagesEl.textContent = TOTAL;
  pageInput.value = li + 1;

  const pct = (ri + 1) / TOTAL * 100;
  progressFill.style.width = pct + '%';
  progressThumb.style.left = pct + '%';

  arrowLeft.classList.toggle('disabled', cur <= 0);
  arrowRight.classList.toggle('disabled', cur + 2 >= TOTAL);
}

// ========== ANIMATION ENGINE (from reference) ==========
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function animateFlip(startAngle, endAngle, els, onComplete) {
  const duration = 650;
  const t0 = performance.now();
  function tick(now) {
    let t = (now - t0) / duration;
    if (t > 1) t = 1;
    const e = easeInOutCubic(t);
    const angle = startAngle + (endAngle - startAngle) * e;
    els.overlay.style.transform = 'rotateY(' + angle + 'deg)';
    // shade/shine
    const half = Math.abs(angle) / 180;
    if (els.frontShade) els.frontShade.style.opacity = half;
    if (els.backShine)  els.backShine.style.opacity  = Math.max(0, 1 - half * 2);
    if (els.dropShadow) {
      const si = Math.sin(half * Math.PI);
      els.dropShadow.style.width  = (si * 40) + 'px';
      els.dropShadow.style.opacity = si * 0.4;
    }
    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      onComplete();
    }
  }
  requestAnimationFrame(tick);
}

function flipForward() {
  if (animating || cur + 2 >= TOTAL) return;
  animating = true;

  const rightIdx = cur + 1;  // page currently shown on right (will flip)
  const newLeftIdx = cur + 2; // page that will be revealed on left (new spread left)
  const newRightIdx = cur + 3; // new right page

  // Create overlay
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:absolute;top:0;left:50%;width:50%;height:100%;transform-style:preserve-3d;transform-origin:left center;z-index:50;';

  // Front face (current right page)
  const front = document.createElement('div');
  front.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;overflow:hidden;border-radius:0 3px 3px 0;';
  const fContent = document.createElement('div');
  fContent.className = 'page-content';
  if (rightIdx >= 0 && rightIdx < TOTAL) {
    fContent.innerHTML = pages[rightIdx].content;
    if (pages[rightIdx].isCover) { fContent.style.padding = '0'; fContent.style.background = 'transparent'; }
  }
  front.appendChild(fContent);

  // Front shade overlay
  const frontShade = document.createElement('div');
  frontShade.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);opacity:0;pointer-events:none;';
  front.appendChild(frontShade);

  // Back face (new left page)
  const back = document.createElement('div');
  back.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;transform:rotateY(180deg);overflow:hidden;border-radius:3px 0 0 3px;';
  const bContent = document.createElement('div');
  bContent.className = 'page-content';
  if (newLeftIdx >= 0 && newLeftIdx < TOTAL) {
    bContent.innerHTML = pages[newLeftIdx].content;
    if (pages[newLeftIdx].isCover) { bContent.style.padding = '0'; bContent.style.background = 'transparent'; }
  }
  back.appendChild(bContent);

  // Back shine
  const backShine = document.createElement('div');
  backShine.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to right,rgba(255,255,255,0.3),transparent 60%);opacity:0;pointer-events:none;';
  back.appendChild(backShine);

  // Drop shadow
  const dropShadow = document.createElement('div');
  dropShadow.style.cssText = 'position:absolute;top:0;right:100%;width:0;height:100%;background:linear-gradient(to left,rgba(0,0,0,0.3),transparent);opacity:0;pointer-events:none;z-index:49;';

  overlay.appendChild(front);
  overlay.appendChild(back);
  overlay.appendChild(dropShadow);

  // Pre-update right page underneath to show new right page
  if (newRightIdx >= 0 && newRightIdx < TOTAL) {
    contentRight.innerHTML = pages[newRightIdx].content;
    if (pages[newRightIdx].isCover) { contentRight.style.padding = '0'; contentRight.style.background = 'transparent'; }
    else { contentRight.style.padding = ''; contentRight.style.background = ''; }
    numRight.textContent = pages[newRightIdx].isCover ? '' : newRightIdx + 1;
  } else {
    contentRight.innerHTML = '';
    contentRight.style.background = '#faf8f0';
    numRight.textContent = '';
  }

  flipInner.appendChild(overlay);

  animateFlip(0, -180, { overlay, frontShade, backShine, dropShadow }, function() {
    flipInner.removeChild(overlay);
    cur += 2;
    showSpread();
    animating = false;
  });
}

function flipBack() {
  if (animating || cur - 2 < 0) return;
  animating = true;

  const leftIdx = cur;        // current left page (will flip)
  const newRightIdx = cur - 1; // page revealed on right
  const newLeftIdx = cur - 2;  // new left page

  // Create overlay
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:absolute;top:0;left:0;width:50%;height:100%;transform-style:preserve-3d;transform-origin:right center;z-index:50;';

  // Front face (current left page)
  const front = document.createElement('div');
  front.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;overflow:hidden;border-radius:3px 0 0 3px;';
  const fContent = document.createElement('div');
  fContent.className = 'page-content';
  if (leftIdx >= 0 && leftIdx < TOTAL) {
    fContent.innerHTML = pages[leftIdx].content;
    if (pages[leftIdx].isCover) { fContent.style.padding = '0'; fContent.style.background = 'transparent'; }
  }
  front.appendChild(fContent);

  const frontShade = document.createElement('div');
  frontShade.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);opacity:0;pointer-events:none;';
  front.appendChild(frontShade);

  // Back face (new right page)
  const back = document.createElement('div');
  back.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;transform:rotateY(180deg);overflow:hidden;border-radius:0 3px 3px 0;';
  const bContent = document.createElement('div');
  bContent.className = 'page-content';
  if (newRightIdx >= 0 && newRightIdx < TOTAL) {
    bContent.innerHTML = pages[newRightIdx].content;
    if (pages[newRightIdx].isCover) { bContent.style.padding = '0'; bContent.style.background = 'transparent'; }
  }
  back.appendChild(bContent);

  const backShine = document.createElement('div');
  backShine.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to left,rgba(255,255,255,0.3),transparent 60%);opacity:0;pointer-events:none;';
  back.appendChild(backShine);

  const dropShadow = document.createElement('div');
  dropShadow.style.cssText = 'position:absolute;top:0;left:100%;width:0;height:100%;background:linear-gradient(to right,rgba(0,0,0,0.3),transparent);opacity:0;pointer-events:none;z-index:49;';

  overlay.appendChild(front);
  overlay.appendChild(back);
  overlay.appendChild(dropShadow);

  // Pre-update left page underneath to show new left page
  if (newLeftIdx >= 0 && newLeftIdx < TOTAL) {
    contentLeft.innerHTML = pages[newLeftIdx].content;
    if (pages[newLeftIdx].isCover) { contentLeft.style.padding = '0'; contentLeft.style.background = 'transparent'; }
    else { contentLeft.style.padding = ''; contentLeft.style.background = ''; }
    numLeft.textContent = pages[newLeftIdx].isCover ? '' : newLeftIdx + 1;
  }

  flipInner.appendChild(overlay);

  animateFlip(0, 180, { overlay, frontShade, backShine, dropShadow }, function() {
    flipInner.removeChild(overlay);
    cur -= 2;
    showSpread();
    animating = false;
  });
}

// ========== NAVIGATION ==========
function goToSpread(pageIdx) {
  if (animating) return;
  // Snap to even
  pageIdx = Math.max(0, Math.min(pageIdx, TOTAL - 1));
  cur = pageIdx - (pageIdx % 2);
  showSpread();
}

// Click zones
document.getElementById('zoneLeft').addEventListener('click', flipBack);
document.getElementById('zoneRight').addEventListener('click', flipForward);

// Arrow buttons
arrowLeft.addEventListener('click', flipBack);
arrowRight.addEventListener('click', flipForward);

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); flipForward(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); flipBack(); }
});

// Touch swipe
document.addEventListener('touchstart', function(e) {
  touchSX = e.touches[0].clientX;
  touchSY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', function(e) {
  const dx = e.changedTouches[0].clientX - touchSX;
  const dy = e.changedTouches[0].clientY - touchSY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) flipForward();
    else flipBack();
  }
}, { passive: true });

// Progress bar
progressTrack.addEventListener('click', function(e) {
  const rect = progressTrack.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const targetPage = Math.round(ratio * (TOTAL - 1));
  goToSpread(targetPage);
});

// Page input
pageInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const val = parseInt(pageInput.value, 10);
    if (val >= 1 && val <= TOTAL) {
      goToSpread(val - 1);
    }
    pageInput.blur();
  }
});

// ========== RESIZE ==========
window.addEventListener('resize', function() {
  sizeBook();
});

// ========== INIT ==========
totalPagesEl.textContent = TOTAL;
sizeBook();
showSpread();
</script>
