<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
    min-height: 100vh;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
    color: #333;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Top Bar */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    z-index: 100;
    color: #fff;
  }
  .top-bar .title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .top-bar .page-info {
    font-size: 13px;
    opacity: 0.8;
    white-space: nowrap;
  }

  /* Book Container */
  .book-container {
    position: fixed;
    top: 50px; bottom: 40px; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1800px;
  }

  .book {
    position: relative;
    width: 900px;
    height: calc(100vh - 140px);
    max-height: 640px;
    display: flex;
    transform-style: preserve-3d;
  }

  /* Pages */
  .page-wrapper {
    position: absolute;
    width: 50%;
    height: 100%;
    transform-style: preserve-3d;
    transition: none;
  }
  .page-wrapper.left-page { left: 0; transform-origin: right center; }
  .page-wrapper.right-page { left: 50%; transform-origin: left center; }

  .page-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    border-radius: 2px;
  }
  .page-face.front { z-index: 1; }
  .page-face.back { transform: rotateY(180deg); }

  .page-content {
    width: 100%;
    height: 100%;
    background: #faf8f0;
    padding: 36px 32px 48px 32px;
    overflow-y: auto;
    font-family: 'Noto Serif KR', serif;
    font-size: 14.5px;
    line-height: 1.85;
    color: #2c2c2c;
    scrollbar-width: thin;
    scrollbar-color: #ccc #faf8f0;
  }
  .page-content::-webkit-scrollbar { width: 4px; }
  .page-content::-webkit-scrollbar-track { background: #faf8f0; }
  .page-content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

  .page-content h1 {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 22px;
    color: #4A6CF7;
    margin-bottom: 16px;
    font-weight: 700;
    line-height: 1.4;
  }
  .page-content h2 {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 17px;
    color: #3a3a5c;
    margin-top: 20px;
    margin-bottom: 10px;
    font-weight: 700;
    line-height: 1.4;
  }
  .page-content h3 {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    color: #4A6CF7;
    margin-top: 16px;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .page-content p {
    margin-bottom: 12px;
  }
  .page-content ul, .page-content ol {
    margin: 10px 0 14px 20px;
  }
  .page-content li {
    margin-bottom: 6px;
  }
  .page-content strong {
    color: #2a2a4a;
    font-weight: 700;
  }
  .page-content em {
    font-style: italic;
    color: #555;
  }
  .page-content blockquote {
    border-left: 3px solid #4A6CF7;
    padding: 10px 16px;
    margin: 12px 0;
    background: rgba(74,108,247,0.05);
    border-radius: 0 4px 4px 0;
    font-size: 14px;
    color: #444;
  }
  .page-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 14px 0;
    font-size: 13px;
  }
  .page-content th {
    background: #4A6CF7;
    color: #fff;
    padding: 8px 10px;
    text-align: left;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12.5px;
  }
  .page-content td {
    padding: 7px 10px;
    border-bottom: 1px solid #e0ddd5;
    font-size: 12.5px;
    line-height: 1.6;
  }
  .page-content tr:nth-child(even) td { background: rgba(74,108,247,0.03); }
  .page-content hr {
    border: none;
    border-top: 1px solid #ddd;
    margin: 20px 0;
  }

  .page-number {
    position: absolute;
    bottom: 14px;
    font-size: 11px;
    color: #999;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .page-number.left { left: 32px; }
  .page-number.right { right: 32px; }

  /* Cover page special styling */
  .cover-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    padding: 40px 30px;
  }
  .cover-page h1 {
    font-size: 28px;
    color: #fff;
    margin-bottom: 12px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .cover-page .subtitle {
    font-size: 16px;
    color: rgba(255,255,255,0.75);
    margin-bottom: 30px;
    font-style: italic;
  }
  .cover-page .desc {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    line-height: 1.8;
    max-width: 340px;
  }
  .cover-page .ornament {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #4A6CF7, transparent);
    margin: 24px 0;
  }

  /* Spine shadow */
  .spine-shadow {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    background: linear-gradient(90deg,
      rgba(0,0,0,0.12) 0%,
      rgba(0,0,0,0.25) 35%,
      rgba(0,0,0,0.35) 50%,
      rgba(0,0,0,0.25) 65%,
      rgba(0,0,0,0.12) 100%
    );
    z-index: 50;
    pointer-events: none;
  }

  /* Book shadow */
  .book-shadow {
    position: absolute;
    bottom: -15px;
    left: 5%; right: 5%;
    height: 20px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.35) 0%, transparent 70%);
    z-index: -1;
  }

  /* Navigation arrows */
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s, background 0.2s;
    z-index: 60;
  }
  .book-container:hover .nav-arrow { opacity: 1; }
  .nav-arrow:hover { background: rgba(255,255,255,0.2); }
  .nav-arrow.disabled { opacity: 0.2 !important; cursor: default; }
  .nav-prev { left: 10px; }
  .nav-next { right: 10px; }

  /* Click zones */
  .click-zone {
    position: absolute;
    top: 0; bottom: 0;
    width: 50%;
    cursor: pointer;
    z-index: 40;
  }
  .click-zone.left { left: 0; }
  .click-zone.right { right: 0; }

  /* Progress bar */
  .progress-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 100;
    gap: 12px;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%;
    background: #4A6CF7;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .progress-text {
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    white-space: nowrap;
    min-width: 40px;
    text-align: right;
  }

  /* Flip animation shadow */
  .flip-shadow {
    position: absolute;
    top: 0; bottom: 0;
    width: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* Mobile styles */
  @media (max-width: 768px) {
    .book {
      width: 94vw;
      max-height: none;
      height: calc(100vh - 120px);
    }
    .book.single-page-mode .page-wrapper {
      width: 100%;
      left: 0;
    }
    .spine-shadow { display: none; }
    .page-content { padding: 24px 20px 44px 20px; font-size: 14px; }
    .page-content h1 { font-size: 20px; }
    .page-content h2 { font-size: 16px; }
    .top-bar .title { font-size: 13px; }
    .nav-arrow { opacity: 0.7; width: 36px; height: 36px; font-size: 16px; }
    .cover-page h1 { font-size: 22px; }
    .cover-page .subtitle { font-size: 14px; }
  }

  /* Animating page */
  .page-wrapper.flipping {
    z-index: 55 !important;
  }
</style>
</head>

<div class="top-bar">

  // Last page
  {
    title: "마지막 페이지",
    content: `<div class="cover-page">
      <h1>감사합니다</h1>
      <div class="ornament"></div>
      <div class="subtitle">AI따라오실 — 누구나 시작하는 AI 첫걸음</div>
      <div class="desc" style="margin-top:20px;">
        여러분은 이미 AI 시대의 첫걸음을 내디뎠어요.<br><br>
        오늘도 5분, AI에게 말 걸어보세요.<br>
        여러분은 이미 충분히 잘하고 있어요.<br><br>
        <strong style="color:#4A6CF7">함께 성장하는 우리 동네 AI 공부방<br>AI따라오실에서 만나요!</strong>
      </div>
    </div>`,
    isCover: true
  }
];

// ========== STATE ==========
let currentSpread = 0; // which "spread" (pair of pages) we're showing
let totalPages = pages.length;
let isAnimating = false;
let isMobile = window.innerWidth <= 768;
let touchStartX = 0;
let touchStartY = 0;

// ========== HELPERS ==========
function getTotalSpreads() {
  if (isMobile) return totalPages; // single page mode
  return Math.ceil(totalPages / 2);
}

function getLeftPageIndex() {
  if (isMobile) return currentSpread;
  return currentSpread * 2;
}

function getRightPageIndex() {
  if (isMobile) return -1; // no right page
  return currentSpread * 2 + 1;
}

// ========== RENDERING ==========
function renderSpread() {
  const book = document.getElementById('book');
  const leftIdx = getLeftPageIndex();
  const rightIdx = getRightPageIndex();

  // Remove old pages (but keep spine-shadow, book-shadow, click-zones)
  const oldPages = book.querySelectorAll('.page-wrapper');
  oldPages.forEach(p => p.remove());

  // Left page
  if (leftIdx >= 0 && leftIdx < totalPages) {
    const wrapper = createPageElement(leftIdx, 'left');
    book.appendChild(wrapper);
  }

  // Right page (desktop only)
  if (!isMobile && rightIdx >= 0 && rightIdx < totalPages) {
    const wrapper = createPageElement(rightIdx, 'right');
    book.appendChild(wrapper);
  }

  updateUI();
}

function createPageElement(pageIdx, side) {
  const page = pages[pageIdx];
  const wrapper = document.createElement('div');
  wrapper.className = `page-wrapper ${side}-page`;

  const face = document.createElement('div');
  face.className = 'page-face front';

  const content = document.createElement('div');
  if (page.isCover) {
    content.className = 'page-content';
    content.innerHTML = page.content;
    content.style.padding = '0';
    content.style.background = 'transparent';
  } else {
    content.className = 'page-content';
    content.innerHTML = page.content;
  }

  // Page number
  const pageNum = document.createElement('div');
  pageNum.className = `page-number ${side}`;
  pageNum.textContent = (pageIdx + 1);

  face.appendChild(content);
  if (!page.isCover) {
    face.appendChild(pageNum);
  }
  wrapper.appendChild(face);

  return wrapper;
}

function updateUI() {
  const leftIdx = getLeftPageIndex();
  const rightIdx = isMobile ? leftIdx : getRightPageIndex();
  const maxIdx = Math.max(leftIdx, rightIdx >= 0 && rightIdx < totalPages ? rightIdx : leftIdx);
  const displayPage = isMobile ? (leftIdx + 1) : `${leftIdx + 1}-${Math.min(rightIdx + 1, totalPages)}`;

  document.getElementById('pageInfo').textContent = `${displayPage} / ${totalPages} 페이지`;

  const progress = ((maxIdx + 1) / totalPages) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('progressText').textContent = Math.round(progress) + '%';

  // Nav buttons
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  btnPrev.classList.toggle('disabled', currentSpread <= 0);
  btnNext.classList.toggle('disabled', currentSpread >= getTotalSpreads() - 1);

  // Spine visibility
  const spine = document.getElementById('spineShadow');
  if (isMobile) {
    spine.style.display = 'none';
  } else {
    spine.style.display = 'block';
  }
}

// ========== FLIP ANIMATION ==========
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function animateFlip(direction, callback) {
  if (isAnimating) return;
  isAnimating = true;

  const book = document.getElementById('book');
  const duration = 650;
  const start = performance.now();

  // Create a flipping page element
  const flipWrapper = document.createElement('div');
  flipWrapper.className = 'page-wrapper flipping';
  flipWrapper.style.transformStyle = 'preserve-3d';
  flipWrapper.style.position = 'absolute';
  flipWrapper.style.width = '50%';
  flipWrapper.style.height = '100%';
  flipWrapper.style.zIndex = '55';

  if (isMobile) {
    flipWrapper.style.width = '100%';
    flipWrapper.style.left = '0';
    flipWrapper.style.transformOrigin = direction === 'next' ? 'left center' : 'right center';
  } else if (direction === 'next') {
    flipWrapper.style.left = '50%';
    flipWrapper.style.transformOrigin = 'left center';
  } else {
    flipWrapper.style.left = '0';
    flipWrapper.style.transformOrigin = 'right center';
  }

  // Front face: current page being flipped
  // Back face: page being revealed
  const frontFace = document.createElement('div');
  frontFace.className = 'page-face front';
  frontFace.style.background = '#faf8f0';

  const backFace = document.createElement('div');
  backFace.className = 'page-face back';
  backFace.style.background = '#faf8f0';

  let frontIdx, backIdx;
  if (direction === 'next') {
    if (isMobile) {
      frontIdx = currentSpread;
      backIdx = currentSpread + 1;
    } else {
      frontIdx = getRightPageIndex();
      backIdx = (currentSpread + 1) * 2;
    }
  } else {
    if (isMobile) {
      frontIdx = currentSpread;
      backIdx = currentSpread - 1;
    } else {
      frontIdx = getLeftPageIndex();
      backIdx = (currentSpread - 1) * 2 + 1;
    }
  }

  if (frontIdx >= 0 && frontIdx < totalPages) {
    const p = pages[frontIdx];
    const c = document.createElement('div');
    c.className = 'page-content';
    if (p.isCover) { c.style.padding = '0'; c.style.background = 'transparent'; }
    c.innerHTML = p.content;
    frontFace.appendChild(c);
  }
  if (backIdx >= 0 && backIdx < totalPages) {
    const p = pages[backIdx];
    const c = document.createElement('div');
    c.className = 'page-content';
    if (p.isCover) { c.style.padding = '0'; c.style.background = 'transparent'; }
    c.innerHTML = p.content;
    backFace.appendChild(c);
  }

  flipWrapper.appendChild(frontFace);
  flipWrapper.appendChild(backFace);
  book.appendChild(flipWrapper);

  function animate(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    const eased = easeInOutCubic(t);

    let angle;
    if (direction === 'next') {
      angle = -180 * eased;
    } else {
      angle = 180 * (1 - eased);
    }

    flipWrapper.style.transform = `rotateY(${angle}deg)`;

    // Dynamic shadow
    const shadowIntensity = Math.sin(t * Math.PI) * 0.3;
    flipWrapper.style.filter = `drop-shadow(0 0 ${10 * shadowIntensity}px rgba(0,0,0,${shadowIntensity}))`;

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      flipWrapper.remove();
      if (direction === 'next') {
        currentSpread++;
      } else {
        currentSpread--;
      }
      renderSpread();
      isAnimating = false;
      if (callback) callback();
    }
  }

  if (direction === 'prev') {
    flipWrapper.style.transform = 'rotateY(180deg)';
  }

  requestAnimationFrame(animate);
}

// ========== NAVIGATION ==========
function nextPage() {
  if (isAnimating || currentSpread >= getTotalSpreads() - 1) return;
  animateFlip('next');
}

function prevPage() {
  if (isAnimating || currentSpread <= 0) return;
  animateFlip('prev');
}

function goToSpread(spread) {
  if (isAnimating) return;
  spread = Math.max(0, Math.min(spread, getTotalSpreads() - 1));
  currentSpread = spread;
  renderSpread();
}

// ========== KEYBOARD ==========
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    nextPage();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    prevPage();
  }
});

// ========== TOUCH ==========
document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) nextPage();
    else prevPage();
  }
}, { passive: true });

// ========== PROGRESS BAR ==========
function onProgressClick(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const targetSpread = Math.round(ratio * (getTotalSpreads() - 1));
  goToSpread(targetSpread);
}

// ========== RESIZE ==========
window.addEventListener('resize', () => {
  const wasMobile = isMobile;
  isMobile = window.innerWidth <= 768;
  if (wasMobile !== isMobile) {
    // Recalculate spread when switching modes
    if (isMobile) {
      // Going to mobile: show left page of current spread
      currentSpread = getLeftPageIndex();
    } else {
      // Going to desktop: calculate which spread contains current page
      currentSpread = Math.floor(currentSpread / 2);
    }
  }
  const book = document.getElementById('book');
  if (isMobile) {
    book.classList.add('single-page-mode');
  } else {
    book.classList.remove('single-page-mode');
  }
  renderSpread();
});

// ========== INIT ==========
function init() {
  const book = document.getElementById('book');
  if (isMobile) {
    book.classList.add('single-page-mode');
  }
  renderSpread();
}

init();
</script>
</body>
</html>
